services:
  mariadb:
    image: mariadb:12
    environment:
      MARIADB_ROOT_PASSWORD: poolpredict
      MARIADB_DATABASE: poolpredict
      MARIADB_USER: poolpredict
      MARIADB_PASSWORD: poolpredict
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - web

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5080:8080"
    depends_on:
      - mariadb
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5080
    ports:
      - "3000:3000"

volumes:
  mariadb-data:
